<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>商家管理 - 评价助手</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6B35;--green:#07C160;--red:#e55;--bg:#f5f5f5;--card:#fff;
  --text:#1a1a1a;--text2:#999;--border:#e0e0e0;--radius:12px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;
}
.hidden{display:none !important;}

/* ── Toolbar ── */
.toolbar{
  background:#1a1a1a;color:#fff;padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:12px;
}
.toolbar h1{font-size:16px;font-weight:600;flex-shrink:0;}
.toolbar .toolbar-right{display:flex;align-items:center;gap:10px;font-size:13px;}
.toolbar button{
  padding:6px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
}
.btn-outline-light{background:transparent;color:#fff;border:1px solid #555;}
.btn-outline-light:hover{background:#333;}
.btn-save{background:var(--orange);color:#fff;}
.btn-delete{background:var(--red);color:#fff;}
.btn-back{background:#444;color:#fff;}

.container{max-width:700px;margin:0 auto;padding:20px;}

/* ── Login view ── */
.login-wrapper{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  background:var(--card);border-radius:16px;padding:36px 28px;width:100%;max-width:380px;
  box-shadow:0 4px 24px rgba(0,0,0,0.1);
}
.login-card .logo{text-align:center;font-size:48px;margin-bottom:8px;}
.login-card h2{text-align:center;font-size:20px;margin-bottom:24px;}
.login-card .field{margin-bottom:16px;}
.login-card .field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.login-card .field input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:15px;font-family:inherit;background:#fafafa;
}
.login-card .field input:focus{outline:none;border-color:var(--orange);background:#fff;}
.login-card .error-text{color:var(--red);font-size:13px;margin-bottom:12px;}
.login-card .btn-row{display:flex;gap:10px;margin-top:20px;}
.login-card .btn-row button{
  flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;
}
.btn-login{background:var(--orange);color:#fff;}
.btn-signup{background:#f0f0f0;color:var(--text);}
.login-card .tip{text-align:center;font-size:12px;color:var(--text2);margin-top:16px;}

/* ── Dashboard view ── */
.dashboard-header{margin-bottom:20px;}
.dashboard-header h2{font-size:18px;}
.dashboard-header p{font-size:13px;color:var(--text2);margin-top:4px;}

.shop-card{
  background:var(--card);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer;transition:transform .1s;
  display:flex;justify-content:space-between;align-items:center;
}
.shop-card:hover{transform:translateY(-1px);}
.shop-card:active{transform:scale(0.99);}
.shop-card .shop-info h3{font-size:16px;margin-bottom:4px;}
.shop-card .shop-info .meta{font-size:13px;color:var(--text2);}
.shop-card .shop-info .meta span{margin-right:12px;}
.shop-card .arrow{font-size:20px;color:#ccc;}

.btn-create-shop{
  width:100%;padding:14px;border:2px dashed var(--border);background:none;
  border-radius:var(--radius);font-size:15px;cursor:pointer;color:var(--text2);
  margin-top:8px;
}
.btn-create-shop:hover{border-color:var(--orange);color:var(--orange);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-state .icon{font-size:56px;margin-bottom:12px;}
.empty-state p{font-size:15px;}

/* ── Editor view ── */
.section{
  background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.section h3{font-size:15px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.section h3 span{font-size:12px;color:var(--text2);font-weight:400;margin-left:8px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.field input,.field textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;font-family:inherit;transition:border-color .2s;background:#fafafa;
}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--orange);background:#fff;}
.field textarea{resize:vertical;min-height:80px;}

.row{display:flex;gap:12px;}
.row .field{flex:1;}

/* text entries */
.text-entry{
  display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;
}
.text-entry textarea{flex:1;min-height:60px;}
.text-entry button{
  flex-shrink:0;width:32px;height:32px;border:1.5px solid #e0e0e0;background:#fff;
  border-radius:6px;cursor:pointer;font-size:16px;line-height:1;color:#999;
}
.text-entry button:hover{background:#fee;border-color:#e88;color:#e55;}
.btn-add-text{
  padding:8px 16px;border:1.5px dashed var(--border);background:none;border-radius:8px;
  font-size:13px;cursor:pointer;color:var(--text2);width:100%;
}
.btn-add-text:hover{border-color:var(--orange);color:var(--orange);}

/* image upload */
.image-upload-area{
  border:2px dashed var(--border);border-radius:var(--radius);padding:32px;
  text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px;
}
.image-upload-area:hover,.image-upload-area.drag{border-color:var(--orange);background:#FFF8F5;}
.image-upload-area p{color:var(--text2);font-size:13px;}

.image-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.image-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:#f0f0f0;}
.image-item img{width:100%;height:100%;object-fit:cover;}
.image-item .remove{
  position:absolute;top:4px;right:4px;width:24px;height:24px;
  background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

.tip{font-size:12px;color:var(--text2);margin-top:4px;}

/* slug input */
.slug-field{display:flex;gap:8px;align-items:flex-end;}
.slug-field .field:first-child{flex:1;}
.slug-field .field:last-child{flex-shrink:0;}
.slug-field input[readonly]{background:#f5f5f5;color:var(--text2);cursor:pointer;user-select:all;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.82);color:#fff;padding:10px 24px;border-radius:20px;
  font-size:14px;z-index:300;pointer-events:none;transition:opacity .25s;
}
.toast.hidden{opacity:0;}
.toast.success{background:var(--green);}

@media(max-width:500px){
  .container{padding:12px;}
  .section{padding:16px;}
  .row{flex-direction:column;gap:0;}
}
</style>
</head>
<body>

<!-- ═══ 登录/注册 ═══ -->
<div id="viewLogin" class="login-wrapper">
  <div class="login-card">
    <div class="logo">🏪</div>
    <h2>商家管理后台</h2>
    <p id="authError" class="error-text hidden"></p>
    <div class="field">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="至少6位" autocomplete="current-password">
    </div>
    <div class="btn-row">
      <button type="button" class="btn-login" id="btnLogin">登 录</button>
      <button type="button" class="btn-signup" id="btnSignup">注册账号</button>
    </div>
    <p class="tip">注册即创建商家账号，登录后可管理自己的店铺</p>
  </div>
</div>

<!-- ═══ 店铺列表 ═══ -->
<div id="viewDashboard" class="hidden">
  <div class="toolbar">
    <h1>🏪 我的店铺</h1>
    <div class="toolbar-right">
      <span id="displayEmail"></span>
      <button class="btn-outline-light" id="btnLogout">退出</button>
    </div>
  </div>
  <div class="container">
    <div class="dashboard-header">
      <h2 id="shopCountLabel">共 0 家店铺</h2>
    </div>
    <div id="shopList"></div>
    <button class="btn-create-shop" id="btnNewShop">+ 创建新店铺</button>
    <button class="btn-create-shop" id="btnImportGgb" style="border-color:var(--orange);color:var(--orange);margin-top:8px;">📥 一键导入 ggb 店铺（塔斯汀）</button>
    <div class="empty-state hidden" id="emptyState">
      <div class="icon">📝</div>
      <p>还没有店铺</p>
      <p style="font-size:13px;color:var(--text2);margin-top:4px;">点击上方按钮创建第一家</p>
    </div>
  </div>
</div>

<!-- ═══ 店铺编辑 ═══ -->
<div id="viewEditor" class="hidden">
  <div class="toolbar">
    <button class="btn-back" id="btnBack">← 返回</button>
    <h1 id="editorTitle">编辑店铺</h1>
    <div class="toolbar-right">
      <button class="btn-delete" id="btnDelete">删除</button>
      <button class="btn-save" id="btnSave">💾 保存</button>
    </div>
  </div>
  <div class="container">
    <!-- 店铺标识 -->
    <div class="section">
      <h3>店铺标识 <span>用于生成页面链接</span></h3>
      <div class="slug-field">
        <div class="field">
          <label>店铺 ID（英文或拼音，创建后不可修改）</label>
          <input id="editSlug" type="text" placeholder="例如：ggb" autocomplete="off">
        </div>
        <div class="field">
          <label>用户链接</label>
          <input id="editUrl" type="text" readonly value="保存后生成" onclick="this.select()">
        </div>
      </div>
    </div>

    <!-- 基本信息 -->
    <div class="section">
      <h3>基本信息</h3>
      <div class="row">
        <div class="field">
          <label>店铺名称</label>
          <input id="editName" type="text" placeholder="例如：塔斯汀中国汉堡(荣昌金科店)">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>评分</label>
          <input id="editRating" type="text" placeholder="例如：4.8">
        </div>
        <div class="field">
          <label>人均价格 (¥)</label>
          <input id="editPrice" type="text" placeholder="例如：21">
        </div>
      </div>
    </div>

    <!-- 平台链接 -->
    <div class="section">
      <h3>评价跳转链接 <span>门店在平台的评价页地址</span></h3>
      <div class="field">
        <label>美团评价页链接（选填）</label>
        <input id="editMeituan" type="url" placeholder="粘贴美团店铺或评价页链接">
        <p class="tip">从美团 App 打开店铺 → 分享 → 复制链接</p>
      </div>
      <div class="field">
        <label>抖音评价页链接或口令（选填）</label>
        <input id="editDouyin" type="text" placeholder="粘贴抖音链接或口令">
        <p class="tip">从抖音 App 打开店铺 → 分享 → 复制链接或口令</p>
      </div>
    </div>

    <!-- 评价文案 -->
    <div class="section">
      <h3>评价文案 <span>多条随机展示，避免被判水军</span></h3>
      <div id="editTextEntries"></div>
      <button class="btn-add-text" id="btnAddText">+ 添加一条文案</button>
    </div>

    <!-- 配图 -->
    <div class="section">
      <h3>配图 <span>用户可保存到手机</span></h3>
      <div class="image-upload-area" id="uploadArea">
        <p>📁 点击或拖拽图片到这里上传</p>
        <p style="font-size:11px;color:#bbb;margin-top:4px;">建议 1:1 正方形，不超过 2MB</p>
      </div>
      <input type="file" id="imageInput" accept="image/*" multiple hidden>
      <div class="image-list" id="editImageList"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
</script>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
